{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5" style="min-height: 50vh;">
    <div class="col-md-8 text-center mt-5">
        <h1 class="display-1 fw-bold text-gold mb-3">404</h1>
        <h2 class="text-white mb-4">Lost in the Void</h2>
        <p class="lead text-secondary mb-5">
            The page you are looking for doesn't exist or has been moved.
            Perhaps the skill you were searching for is in another category?
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-gold btn-lg shadow-sm px-4 py-2 fw-bold">
            <i class="bi bi-house-door-fill me-2"></i>Return Home
        </a>
    </div>
</div>
{% endblock %}
